name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: python -m pip install -r desktop/requirements.txt
      - name: Install CI tooling
        run: python -m pip install pytest ruff mypy
      - name: Run linter
        run: python -m ruff check desktop/
      - name: Run type check
        run: python -m mypy desktop/ --follow-imports=skip
      
