name: Release

on:
  push:
    branches: [main]

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build Windows executable
        shell: pwsh
        run: ./scripts/build_windows.ps1

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: IDM-Windows
          path: dist/IDM/**